<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Global Sky Shipment — Support Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #03091f;
    --surface: #070f2b;
    --surface2: #0b1638;
    --surface3: #0f1d45;
    --border: rgba(96,165,250,0.1);
    --border2: rgba(96,165,250,0.2);
    --blue: #2563eb;
    --blue-bright: #3b82f6;
    --blue-light: #60a5fa;
    --blue-dim: rgba(59,130,246,0.12);
    --blue-glow: rgba(37,99,235,0.25);
    --white: #ffffff;
    --text: #e8f0ff;
    --muted: #6b8ec7;
    --muted2: #4a6fa5;
    --success: #22c55e;
    --success-dim: rgba(34,197,94,0.12);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── Background ─── */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(37,99,235,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(59,130,246,0.08) 0%, transparent 60%);
  }
  .grid-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ─── Header ─── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
    background: rgba(3,9,31,0.85);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .back-btn {
    display: flex; align-items: center; gap: 0.4rem;
    color: var(--muted); font-size: 0.8rem; font-weight: 500;
    text-decoration: none; padding: 0.35rem 0.75rem;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--blue-dim);
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: var(--blue-light); border-color: var(--border2); }
  .header-agent {
    display: flex; align-items: center; gap: 0.65rem;
  }
  .agent-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
    border: 2px solid rgba(96,165,250,0.25);
  }
  .agent-info { display: flex; flex-direction: column; }
  .agent-name {
    font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700;
    color: var(--white);
  }
  .agent-status {
    font-size: 0.65rem; color: var(--success);
    display: flex; align-items: center; gap: 0.3rem;
  }
  .status-dot-sm {
    width: 6px; height: 6px; border-radius: 50%; background: var(--success);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ─── Chat Wrapper ─── */
  .chat-wrap {
    position: relative; z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    padding: 0;
    overflow: hidden;
  }

  /* ─── Messages Area ─── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1.25rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    scroll-behavior: smooth;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ─── System message ─── */
  .sys-msg {
    text-align: center;
    font-size: 0.7rem; color: var(--muted2);
    padding: 0.3rem 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    align-self: center;
    max-width: 80%;
  }

  /* ─── Bubble ─── */
  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    animation: bubbleIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bubble-row.user { flex-direction: row-reverse; }
  .bubble-row.admin { flex-direction: row; }

  .bubble-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    font-family: 'Outfit', sans-serif;
  }
  .bubble-avatar.user-av {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: #fff;
  }
  .bubble-avatar.admin-av {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
  }

  .bubble {
    max-width: 72%;
    padding: 0.7rem 1rem;
    border-radius: 16px;
    font-size: 0.875rem;
    line-height: 1.55;
    word-break: break-word;
    position: relative;
  }
  .bubble-row.user .bubble {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
  }
  .bubble-row.admin .bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .bubble-time {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.45);
    margin-top: 0.3rem;
    display: block;
    text-align: right;
  }
  .bubble-row.admin .bubble-time {
    color: var(--muted2);
    text-align: left;
  }

  /* ─── Typing indicator ─── */
  .typing-indicator {
    display: none;
    align-items: center;
    gap: 0.5rem;
    padding: 0.25rem 0;
  }
  .typing-indicator.show { display: flex; }
  .typing-dots { display: flex; gap: 4px; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted2);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30%          { transform: translateY(-5px); opacity: 1; }
  }

  /* ─── Name prompt ─── */
  .name-prompt {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 1.5rem;
    margin: 1rem;
    text-align: center;
    animation: bubbleIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  .name-prompt h3 {
    font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
    margin-bottom: 0.4rem; color: var(--white);
  }
  .name-prompt p { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
  .name-input-row { display: flex; gap: 0.5rem; }
  .name-inp {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 10px;
    padding: 0.65rem 0.9rem;
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .name-inp:focus {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .name-inp::placeholder { color: var(--muted2); }
  .name-start-btn {
    padding: 0.65rem 1.2rem;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none; border-radius: 10px; color: #fff;
    font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(37,99,235,0.4);
  }
  .name-start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }

  /* ─── Input bar ─── */
  .input-bar {
    display: none;
    align-items: flex-end;
    gap: 0.65rem;
    padding: 0.85rem 1.25rem;
    border-top: 1px solid var(--border);
    background: rgba(3,9,31,0.9);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
    position: relative; z-index: 2;
  }
  .input-bar.visible { display: flex; }
  .msg-textarea {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow-y: auto;
  }
  .msg-textarea:focus {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  .msg-textarea::placeholder { color: var(--muted2); }
  .send-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none; border-radius: 12px; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(37,99,235,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(37,99,235,0.6); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── Photo button ─── */
  .photo-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 12px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    font-size: 1.1rem;
  }
  .photo-btn:hover { color: var(--blue-light); border-color: var(--blue-bright); background: var(--blue-dim); }
  .photo-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── Image bubble ─── */
  .bubble-img {
    max-width: 100%; max-height: 220px;
    border-radius: 10px; display: block;
    cursor: pointer;
    margin-bottom: 0.3rem;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* ─── Upload progress ─── */
  .upload-progress {
    font-size: 0.72rem; color: var(--muted);
    text-align: center; padding: 0.25rem 0;
    display: none;
  }
  .upload-progress.show { display: block; }

  /* ─── Image lightbox ─── */
  .lightbox {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .lightbox-close {
    position: absolute; top: 1rem; right: 1rem;
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    font-size: 1.4rem; width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  /* ─── Empty state ─── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; padding: 2rem; text-align: center; gap: 0.5rem;
    color: var(--muted);
  }
  .empty-state .es-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.8rem; line-height: 1.6; max-width: 260px; }

  /* ─── Loading skeleton ─── */
  .chat-loading {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.5rem; padding: 2rem; color: var(--muted);
    font-size: 0.8rem;
  }
  .spin {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(96,165,250,0.2);
    border-top-color: var(--blue-bright);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-layer"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Photo" />
</div>

<!-- Hidden file input -->
<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)" />

<!-- ─── HEADER ─── -->
<header>
  <div class="header-left">
    <a class="back-btn" href="track.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
  </div>
  <div class="header-agent">
    <div class="agent-avatar">✈</div>
    <div class="agent-info">
      <span class="agent-name">Global Sky Support</span>
      <span class="agent-status">
        <span class="status-dot-sm"></span>
        Online — typically replies in minutes
      </span>
    </div>
  </div>
  <div style="width:60px"></div><!-- spacer -->
</header>

<!-- ─── CHAT ─── -->
<div class="chat-wrap">

  <!-- Messages scroll area — always visible -->
  <div class="messages-area" id="messagesArea">
    <div class="chat-loading" id="chatLoading">
      <div class="spin"></div>
      Loading messages…
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar visible" id="inputBar">
    <button class="photo-btn" id="photoBtn" onclick="document.getElementById('photoInput').click()" title="Send a photo">
      📷
    </button>
    <textarea class="msg-textarea" id="msgInput" rows="1" placeholder="Type a message…"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="upload-progress" id="uploadProgress">📤 Uploading photo…</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://azxbtwklromrnmyutmoz.supabase.co';
const SUPABASE_ANON = 'sb_publishable_MaHxITBZRvjweKDwS4cr8g__A6jZI0k';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ─────────────────────────────────────────────────────────────────────
let SESSION_ID   = localStorage.getItem('gss_session_id') || null;
let SENDER_NAME  = localStorage.getItem('gss_sender_name') || null;
let _channel     = null;

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Pull tracking code from URL param or localStorage (written by track.html)
  const params        = new URLSearchParams(window.location.search);
  const codeFromUrl   = params.get('code');
  const codeFromStore = localStorage.getItem('gss_track_code');
  const trackingCode  = (codeFromUrl || codeFromStore || '').toUpperCase().trim();

  // Always use the tracking code as the sender name when available
  if (trackingCode) {
    SENDER_NAME = trackingCode;
    localStorage.setItem('gss_sender_name', SENDER_NAME);
  }

  // Create a session tied to this tracking code if none exists yet
  if (!SESSION_ID) {
    const base = trackingCode || ('anon_' + Math.random().toString(36).slice(2, 8));
    SESSION_ID = 'sess_' + base + '_' + Date.now();
    localStorage.setItem('gss_session_id', SESSION_ID);
  }

  loadMessages();
  subscribeRealtime();
});

// ── START CHAT (kept for fallback — no longer called automatically) ────────────
function startChat() {
  loadMessages();
  subscribeRealtime();
}

// ── SHOW CHAT UI ──────────────────────────────────────────────────────────────
function showChat() {
  // No-op: chat area is always visible now
}

// ── LOAD HISTORY + AUTO-GREETING ─────────────────────────────────────────────
async function loadMessages() {
  try {
    const { data, error } = await _supabase
      .from('support_messages')
      .select('*')
      .eq('session_id', SESSION_ID)
      .order('created_at', { ascending: true });

    document.getElementById('chatLoading')?.remove();

    if (error) throw error;

    if (!data || data.length === 0) {
      // First ever open — insert the greeting into Supabase so admin sees it
      const greetingContent =
        `👋 Hello! Welcome to Global Sky Shipment support.\n` +
        `We have received your enquiry for tracking code ${SENDER_NAME || 'your shipment'}.\n` +
        `Our team is reviewing your case and will reply shortly. ` +
        `You can reach us directly at globalskyshipment247@gmail.com.`;

      const greetingRow = {
        session_id:  SESSION_ID,
        sender_name: 'Global Sky Support',
        sender:      'admin',
        content:     greetingContent,
        created_at:  new Date().toISOString()
      };

      // Insert into Supabase (best-effort; show locally either way)
      await _supabase.from('support_messages').insert([greetingRow]);

      appendSystemMsg('Chat started — our team will reply shortly.');
      renderBubble({ ...greetingRow, id: 'greeting_local' }, true);
    } else {
      data.forEach(msg => renderBubble(msg, false));
      scrollBottom();
    }
  } catch (err) {
    document.getElementById('chatLoading')?.remove();
    appendSystemMsg('Could not load messages. Check your connection.');
    console.error(err);
  }
}

// ── REALTIME SUBSCRIPTION ─────────────────────────────────────────────────────
function subscribeRealtime() {
  if (_channel) _supabase.removeChannel(_channel);

  _channel = _supabase
    .channel('messages-' + SESSION_ID)
    .on(
      'postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'support_messages',
        filter: `session_id=eq.${SESSION_ID}`
      },
      (payload) => {
        if (payload.new) {
          // Avoid duplicate rendering of messages we just sent
          const existing = document.querySelector(`[data-msg-id="${payload.new.id}"]`);
          if (!existing) {
            renderBubble(payload.new, true);
          }
        }
      }
    )
    .subscribe();
}

// ── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value  = '';
  input.style.height = '';

  const msgObj = {
    session_id:   SESSION_ID,
    sender_name:  SENDER_NAME,
    sender:       'user',
    content:      text,
    created_at:   new Date().toISOString()
  };

  // Optimistic UI — render immediately
  renderBubble({ ...msgObj, id: 'pending_' + Date.now() }, true);

  try {
    const { error } = await _supabase
      .from('support_messages')
      .insert([msgObj]);

    if (error) {
      console.error('Send error:', error);
      appendSystemMsg('⚠ Message failed to send. Please try again.');
    }
  } catch (err) {
    console.error(err);
    appendSystemMsg('⚠ Network error. Please try again.');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

// ── RENDER BUBBLE ─────────────────────────────────────────────────────────────
function renderBubble(msg, doScroll) {
  const area = document.getElementById('messagesArea');
  const isUser = msg.sender === 'user';

  const row = document.createElement('div');
  row.className = `bubble-row ${isUser ? 'user' : 'admin'}`;
  if (msg.id) row.dataset.msgId = msg.id;

  const initials = isUser
    ? (SENDER_NAME || 'U').slice(0, 1).toUpperCase()
    : 'GS';

  const timeStr = formatTime(msg.created_at);
  const content = msg.content || '';
  // [image-path] = private bucket path (no public URL).
  // Users only see a "Photo sent" placeholder — the actual image is private
  // and can only be viewed by admin.html via a server-side signed URL.
  const isImage = content.startsWith('[image-path]') || content.startsWith('[image]');
  const bodyHtml = isImage
    ? `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.25rem 0;color:rgba(255,255,255,0.7);font-size:0.8rem">
         <span style="font-size:1.2rem">📷</span>
         <span>Photo sent — visible to support team only</span>
       </div>`
    : escapeHtml(content);

  row.innerHTML = `
    <div class="bubble-avatar ${isUser ? 'user-av' : 'admin-av'}">${initials}</div>
    <div class="bubble">
      ${bodyHtml}
      <span class="bubble-time">${timeStr}</span>
    </div>
  `;

  area.appendChild(row);
  if (doScroll) scrollBottom();
}

// ── SYSTEM MSG ────────────────────────────────────────────────────────────────
function appendSystemMsg(text) {
  const area = document.getElementById('messagesArea');
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  area.appendChild(el);
  scrollBottom();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function scrollBottom() {
  const area = document.getElementById('messagesArea');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function escapeHtml(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/\n/g, '<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── PHOTO UPLOAD ──────────────────────────────────────────────────────────────
async function handlePhotoSelect(event) {
  const file = event.target.files[0];
  event.target.value = ''; // reset so same file can be re-selected
  if (!file) return;

  // 10 MB limit
  if (file.size > 10 * 1024 * 1024) {
    appendSystemMsg('⚠ Photo too large. Max size is 10 MB.');
    return;
  }

  const photoBtn = document.getElementById('photoBtn');
  const sendBtn  = document.getElementById('sendBtn');
  const progress = document.getElementById('uploadProgress');

  photoBtn.disabled = true;
  sendBtn.disabled  = true;
  progress.classList.add('show');

  try {
    // Upload to Supabase Storage
    const ext      = file.name.split('.').pop() || 'jpg';
    const fileName = `${SESSION_ID}_${Date.now()}.${ext}`;
    const { data: uploadData, error: uploadError } = await _supabase
      .storage
      .from('chat-images')
      .upload(fileName, file, { contentType: file.type, upsert: false });

    if (uploadError) throw uploadError;

    // ── PRIVATE BUCKET: store only the file path, NOT a public URL ──
    // Only admin.html (which creates a fresh signed URL server-side) can view the image.
    // Users in message.html cannot retrieve the image of another session because
    // (a) the bucket has no public access, and
    // (b) createSignedUrl is called with the session's own fileName only during upload.
    // The stored content is the storage path, prefixed with [image-path] so the
    // admin panel knows to request a signed URL before rendering.
    const storagePath = fileName; // e.g. "sess_GSS-123_1234567890.jpg"

    // Send as a message with [image-path] prefix (path only, no public URL)
    const msgObj = {
      session_id:  SESSION_ID,
      sender_name: SENDER_NAME,
      sender:      'user',
      content:     '[image-path]' + storagePath,
      created_at:  new Date().toISOString()
    };

    renderBubble({ ...msgObj, id: 'pending_img_' + Date.now() }, true);

    const { error: insertError } = await _supabase
      .from('support_messages')
      .insert([msgObj]);

    if (insertError) {
      console.error('Insert error:', insertError);
      appendSystemMsg('⚠ Photo sent but failed to save. Please try again.');
    }
  } catch (err) {
    console.error('Photo upload error:', err);
    appendSystemMsg('⚠ Failed to upload photo. Please try again.');
  } finally {
    photoBtn.disabled = false;
    sendBtn.disabled  = false;
    progress.classList.remove('show');
  }
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function escapeAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
