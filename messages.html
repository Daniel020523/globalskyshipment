<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Global Sky Shipment — Support Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #03091f;
    --surface: #070f2b;
    --surface2: #0b1638;
    --surface3: #0f1d45;
    --border: rgba(96,165,250,0.1);
    --border2: rgba(96,165,250,0.2);
    --blue: #2563eb;
    --blue-bright: #3b82f6;
    --blue-light: #60a5fa;
    --blue-dim: rgba(59,130,246,0.12);
    --blue-glow: rgba(37,99,235,0.25);
    --white: #ffffff;
    --text: #e8f0ff;
    --muted: #6b8ec7;
    --muted2: #4a6fa5;
    --success: #22c55e;
    --success-dim: rgba(34,197,94,0.12);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── Background ─── */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(37,99,235,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(59,130,246,0.08) 0%, transparent 60%);
  }
  .grid-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ─── Header ─── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
    background: rgba(3,9,31,0.85);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .back-btn {
    display: flex; align-items: center; gap: 0.4rem;
    color: var(--muted); font-size: 0.8rem; font-weight: 500;
    text-decoration: none; padding: 0.35rem 0.75rem;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--blue-dim);
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: var(--blue-light); border-color: var(--border2); }
  .header-agent {
    display: flex; align-items: center; gap: 0.65rem;
  }
  .agent-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
    border: 2px solid rgba(96,165,250,0.25);
  }
  .agent-info { display: flex; flex-direction: column; }
  .agent-name {
    font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700;
    color: var(--white);
  }
  .agent-status {
    font-size: 0.65rem; color: var(--success);
    display: flex; align-items: center; gap: 0.3rem;
  }
  .status-dot-sm {
    width: 6px; height: 6px; border-radius: 50%; background: var(--success);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ─── Chat Wrapper ─── */
  .chat-wrap {
    position: relative; z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    padding: 0;
    overflow: hidden;
  }

  /* ─── Messages Area ─── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1.25rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    scroll-behavior: smooth;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ─── System message ─── */
  .sys-msg {
    text-align: center;
    font-size: 0.7rem; color: var(--muted2);
    padding: 0.3rem 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    align-self: center;
    max-width: 80%;
  }

  /* ─── Bubble ─── */
  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    animation: bubbleIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bubble-row.user { flex-direction: row-reverse; }
  .bubble-row.admin { flex-direction: row; }

  .bubble-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    font-family: 'Outfit', sans-serif;
  }
  .bubble-avatar.user-av {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: #fff;
  }
  .bubble-avatar.admin-av {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
  }

  .bubble {
    max-width: 72%;
    padding: 0.7rem 1rem;
    border-radius: 16px;
    font-size: 0.875rem;
    line-height: 1.55;
    word-break: break-word;
    position: relative;
  }
  .bubble-row.user .bubble {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
  }
  .bubble-row.admin .bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .bubble-time {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.45);
    margin-top: 0.3rem;
    display: block;
    text-align: right;
  }
  .bubble-row.admin .bubble-time {
    color: var(--muted2);
    text-align: left;
  }

  /* ─── Typing indicator ─── */
  .typing-indicator {
    display: none;
    align-items: center;
    gap: 0.5rem;
    padding: 0.25rem 0;
  }
  .typing-indicator.show { display: flex; }
  .typing-dots { display: flex; gap: 4px; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted2);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30%          { transform: translateY(-5px); opacity: 1; }
  }

  /* ─── Name prompt ─── */
  .name-prompt {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 1.5rem;
    margin: 1rem;
    text-align: center;
    animation: bubbleIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  .name-prompt h3 {
    font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
    margin-bottom: 0.4rem; color: var(--white);
  }
  .name-prompt p { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
  .name-input-row { display: flex; gap: 0.5rem; }
  .name-inp {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 10px;
    padding: 0.65rem 0.9rem;
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .name-inp:focus {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .name-inp::placeholder { color: var(--muted2); }
  .name-start-btn {
    padding: 0.65rem 1.2rem;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none; border-radius: 10px; color: #fff;
    font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(37,99,235,0.4);
  }
  .name-start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }

  /* ─── Input bar ─── */
  .input-bar {
    display: none;
    align-items: flex-end;
    gap: 0.65rem;
    padding: 0.85rem 1.25rem;
    border-top: 1px solid var(--border);
    background: rgba(3,9,31,0.9);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
    position: relative; z-index: 2;
  }
  .input-bar.visible { display: flex; }
  .msg-textarea {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow-y: auto;
  }
  .msg-textarea:focus {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  .msg-textarea::placeholder { color: var(--muted2); }
  .send-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none; border-radius: 12px; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(37,99,235,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(37,99,235,0.6); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── Photo button ─── */
  .photo-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 12px; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    font-size: 1.1rem;
  }
  .photo-btn:hover { color: var(--blue-light); border-color: var(--blue-bright); background: var(--blue-dim); }
  .photo-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── Image bubble ─── */
  .bubble-img {
    max-width: 100%; max-height: 220px;
    border-radius: 10px; display: block;
    cursor: pointer;
    margin-bottom: 0.3rem;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* ─── Upload progress ─── */
  .upload-progress {
    font-size: 0.72rem; color: var(--muted);
    text-align: center; padding: 0.25rem 0;
    display: none;
  }
  .upload-progress.show { display: block; }

  /* ─── Image lightbox ─── */
  .lightbox {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .lightbox-close {
    position: absolute; top: 1rem; right: 1rem;
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    font-size: 1.4rem; width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  /* ─── Empty state ─── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; padding: 2rem; text-align: center; gap: 0.5rem;
    color: var(--muted);
  }
  .empty-state .es-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.8rem; line-height: 1.6; max-width: 260px; }

  /* ─── Loading skeleton ─── */
  .chat-loading {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.5rem; padding: 2rem; color: var(--muted);
    font-size: 0.8rem;
  }
  .spin {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(96,165,250,0.2);
    border-top-color: var(--blue-bright);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-layer"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Photo" />
</div>

<!-- Hidden file input -->
<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)" />

<!-- ─── HEADER ─── -->
<header>
  <div class="header-left">
    <a class="back-btn" href="javascript:void(0)" onclick="goBackToTracking()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
  </div>
  <div class="header-agent">
    <div class="agent-avatar">✈</div>
    <div class="agent-info">
      <span class="agent-name">Global Sky Support</span>
      <span class="agent-status">
        <span class="status-dot-sm"></span>
        Online — typically replies in minutes
      </span>
    </div>
  </div>
  <div style="width:60px"></div><!-- spacer -->
</header>

<!-- ─── CHAT ─── -->
<div class="chat-wrap">

  <!-- Messages scroll area — always visible -->
  <div class="messages-area" id="messagesArea">
    <div class="chat-loading" id="chatLoading">
      <div class="spin"></div>
      Loading messages…
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar visible" id="inputBar">
    <button class="photo-btn" id="photoBtn" onclick="document.getElementById('photoInput').click()" title="Send a photo">
      📷
    </button>
    <textarea class="msg-textarea" id="msgInput" rows="1" placeholder="Type a message…"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="upload-progress" id="uploadProgress">📤 Uploading photo…</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://azxbtwklromrnmyutmoz.supabase.co';
const SUPABASE_ANON = 'sb_publishable_MaHxITBZRvjweKDwS4cr8g__A6jZI0k';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ─────────────────────────────────────────────────────────────────────
// TRACK_CODE is the user's unique identifier — used to scope all DB reads/writes
// to only rows where track_code = TRACK_CODE. Users cannot read other sessions.
let TRACK_CODE   = null;
let SENDER_NAME  = localStorage.getItem('gss_sender_name') || null;
let _channel     = null;
// Local cache of message rows (from `messages` table) belonging to this user
let _localMsgs   = [];

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params        = new URLSearchParams(window.location.search);
  const codeFromUrl   = params.get('code');
  const codeFromStore = localStorage.getItem('gss_track_code');
  TRACK_CODE = (codeFromUrl || codeFromStore || '').toUpperCase().trim() || null;

  if (TRACK_CODE) {
    SENDER_NAME = TRACK_CODE;
    localStorage.setItem('gss_sender_name', SENDER_NAME);
  } else {
    // Generate an anonymous identifier if no tracking code is available
    TRACK_CODE = localStorage.getItem('gss_anon_id') || ('ANON-' + Math.random().toString(36).slice(2, 10).toUpperCase());
    localStorage.setItem('gss_anon_id', TRACK_CODE);
    SENDER_NAME = SENDER_NAME || TRACK_CODE;
  }

  loadMessages();
  subscribeRealtime();
});

// ── LOAD HISTORY ─────────────────────────────────────────────────────────────
// Users can ONLY read rows where track_code equals their own TRACK_CODE.
async function loadMessages() {
  try {
    const { data, error } = await _supabase
      .from('messages')
      .select('id, name, track_code, message, reply, replied_at, created_at')
      .eq('track_code', TRACK_CODE)   // ← scope: own ID only
      .order('created_at', { ascending: true });

    document.getElementById('chatLoading')?.remove();
    if (error) throw error;

    _localMsgs = data || [];

    if (_localMsgs.length === 0) {
      // No messages yet — show a local welcome note (not stored)
      appendSystemMsg('Chat started — our team will reply shortly.');
      renderWelcomeBubble();
    } else {
      // Render each message row as a user bubble + optional admin reply bubble
      _localMsgs.forEach(row => renderRowBubbles(row, false));
      scrollBottom();
    }
  } catch (err) {
    document.getElementById('chatLoading')?.remove();
    appendSystemMsg('Could not load messages. Check your connection.');
    console.error(err);
  }
}

// ── REALTIME SUBSCRIPTION ─────────────────────────────────────────────────────
// Subscribe to INSERT and UPDATE events on `messages`, filtered to own track_code.
// This lets the user see admin replies in real time without polling.
function subscribeRealtime() {
  if (_channel) _supabase.removeChannel(_channel);

  _channel = _supabase
    .channel('user-messages-' + TRACK_CODE)
    .on(
      'postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `track_code=eq.${TRACK_CODE}`   // ← scope: own ID only
      },
      (payload) => {
        if (!payload.new) return;
        const existing = _localMsgs.find(m => m.id === payload.new.id);
        if (!existing) {
          _localMsgs.push(payload.new);
          renderRowBubbles(payload.new, true);
        }
      }
    )
    .on(
      'postgres_changes',
      {
        event: 'UPDATE',
        schema: 'public',
        table: 'messages',
        filter: `track_code=eq.${TRACK_CODE}`   // ← scope: own ID only
      },
      (payload) => {
        if (!payload.new) return;
        const idx = _localMsgs.findIndex(m => m.id === payload.new.id);
        if (idx !== -1) {
          _localMsgs[idx] = payload.new;
        } else {
          _localMsgs.push(payload.new);
        }
        // Re-render this specific row's reply bubble
        refreshReplyBubble(payload.new);
      }
    )
    .subscribe();
}

// ── SEND MESSAGE ─────────────────────────────────────────────────────────────
// Writes a new row to `messages` with track_code = TRACK_CODE.
// The admin panel will see this row and can reply via the `reply` field.
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled      = true;
  input.value       = '';
  input.style.height = '';

  const newRow = {
    name:       SENDER_NAME,
    track_code: TRACK_CODE,
    message:    text,
    read:       false,
    created_at: new Date().toISOString()
  };

  // Optimistic UI — show user bubble immediately
  const tempId = 'pending_' + Date.now();
  renderUserBubble({ ...newRow, id: tempId }, true);

  try {
    const { data, error } = await _supabase
      .from('messages')
      .insert([newRow])
      .select('id, name, track_code, message, reply, replied_at, created_at')
      .single();

    if (error) throw error;

    // Replace temp entry with real DB row
    const tempEl = document.querySelector(`[data-msg-id="${tempId}"]`);
    if (tempEl && data?.id) tempEl.dataset.msgId = data.id;

    _localMsgs.push(data);
  } catch (err) {
    console.error('Send error:', err);
    appendSystemMsg('⚠ Message failed to send. Please try again.');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

// ── RENDER ROW (user message + admin reply if present) ───────────────────────
function renderRowBubbles(row, doScroll) {
  renderUserBubble(row, false);
  if (row.reply) {
    renderAdminBubble(row, false);
  }
  if (doScroll) scrollBottom();
}

// Render the user's outgoing message bubble
function renderUserBubble(row, doScroll) {
  const area     = document.getElementById('messagesArea');
  const initials = (SENDER_NAME || 'U').slice(0, 1).toUpperCase();
  const timeStr  = formatTime(row.created_at);
  const content  = row.message || '';
  const isImage  = content.startsWith('[image-path]') || content.startsWith('[image]');
  const bodyHtml = isImage
    ? `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.25rem 0;color:rgba(255,255,255,0.7);font-size:0.8rem">
         <span style="font-size:1.2rem">📷</span>
         <span>Photo sent — visible to support team only</span>
       </div>`
    : escapeHtml(content);

  const row_el = document.createElement('div');
  row_el.className = 'bubble-row user';
  if (row.id) row_el.dataset.msgId = row.id;
  row_el.innerHTML = `
    <div class="bubble-avatar user-av">${initials}</div>
    <div class="bubble">
      ${bodyHtml}
      <span class="bubble-time">${timeStr}</span>
    </div>`;
  area.appendChild(row_el);
  if (doScroll) scrollBottom();
}

// Render admin's reply bubble for a given row
function renderAdminBubble(row, doScroll) {
  const area    = document.getElementById('messagesArea');
  const timeStr = formatTime(row.replied_at || row.created_at);
  const replyEl = document.createElement('div');
  replyEl.className = 'bubble-row admin';
  replyEl.dataset.replyFor = row.id;
  replyEl.innerHTML = `
    <div class="bubble-avatar admin-av">GS</div>
    <div class="bubble">
      ${escapeHtml(row.reply)}
      <span class="bubble-time">${timeStr}</span>
    </div>`;
  area.appendChild(replyEl);
  if (doScroll) scrollBottom();
}

// When an UPDATE arrives, add the reply bubble if it doesn't exist yet
function refreshReplyBubble(row) {
  if (!row.reply) return;
  const existing = document.querySelector(`[data-reply-for="${row.id}"]`);
  if (!existing) {
    renderAdminBubble(row, true);
    appendSystemMsg('💬 Support has replied to your message.');
  } else {
    // Update text in place in case reply was edited
    const bubble = existing.querySelector('.bubble');
    if (bubble) {
      const timeStr = formatTime(row.replied_at || row.created_at);
      bubble.innerHTML = `${escapeHtml(row.reply)}<span class="bubble-time">${timeStr}</span>`;
    }
  }
}

// Render a welcome bubble from support (local only, not stored)
function renderWelcomeBubble() {
  const area = document.getElementById('messagesArea');
  const greetingContent =
    `👋 Hello! Welcome to Global Sky Shipment support.\n` +
    `We have received your enquiry for tracking code ${SENDER_NAME || 'your shipment'}.\n` +
    `Our team is reviewing your case and will reply shortly. ` +
    `You can reach us directly at globalskyshipment247@gmail.com.`;

  const greetEl = document.createElement('div');
  greetEl.className = 'bubble-row admin';
  greetEl.innerHTML = `
    <div class="bubble-avatar admin-av">GS</div>
    <div class="bubble">
      ${escapeHtml(greetingContent)}
      <span class="bubble-time">${formatTime(new Date().toISOString())}</span>
    </div>`;
  area.appendChild(greetEl);
  scrollBottom();
}

// ── SYSTEM MSG ────────────────────────────────────────────────────────────────
function appendSystemMsg(text) {
  const area = document.getElementById('messagesArea');
  const el   = document.createElement('div');
  el.className   = 'sys-msg';
  el.textContent = text;
  area.appendChild(el);
  scrollBottom();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function scrollBottom() {
  const area = document.getElementById('messagesArea');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/\n/g, '<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── PHOTO UPLOAD ──────────────────────────────────────────────────────────────
async function handlePhotoSelect(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;

  if (file.size > 10 * 1024 * 1024) {
    appendSystemMsg('⚠ Photo too large. Max size is 10 MB.');
    return;
  }

  const photoBtn = document.getElementById('photoBtn');
  const sendBtn  = document.getElementById('sendBtn');
  const progress = document.getElementById('uploadProgress');

  photoBtn.disabled = true;
  sendBtn.disabled  = true;
  progress.classList.add('show');

  try {
    const ext      = file.name.split('.').pop() || 'jpg';
    const fileName = `${TRACK_CODE}_${Date.now()}.${ext}`;
    const { error: uploadError } = await _supabase
      .storage
      .from('chat-images')
      .upload(fileName, file, { contentType: file.type, upsert: false });

    if (uploadError) throw uploadError;

    // Store only the path (private bucket) — admin creates a signed URL to view it
    const newRow = {
      name:       SENDER_NAME,
      track_code: TRACK_CODE,
      message:    '[image-path]' + fileName,
      read:       false,
      created_at: new Date().toISOString()
    };

    const tempId = 'pending_img_' + Date.now();
    renderUserBubble({ ...newRow, id: tempId }, true);

    const { data, error: insertError } = await _supabase
      .from('messages')
      .insert([newRow])
      .select('id, name, track_code, message, reply, replied_at, created_at')
      .single();

    if (insertError) throw insertError;

    const tempEl = document.querySelector(`[data-msg-id="${tempId}"]`);
    if (tempEl && data?.id) tempEl.dataset.msgId = data.id;
    _localMsgs.push(data);
  } catch (err) {
    console.error('Photo upload error:', err);
    appendSystemMsg('⚠ Failed to upload photo. Please try again.');
  } finally {
    photoBtn.disabled = false;
    sendBtn.disabled  = false;
    progress.classList.remove('show');
  }
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function escapeAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── BACK NAVIGATION ──────────────────────────────────────────────────────────
// Always goes back to the tracking page, never to a user details page.
function goBackToTracking() {
  // If there's a track code, go to track.html with it so user sees their shipment
  if (TRACK_CODE && !TRACK_CODE.startsWith('ANON-')) {
    window.location.href = 'track.html?code=' + encodeURIComponent(TRACK_CODE);
  } else {
    window.location.href = 'track.html';
  }
}
</script>
